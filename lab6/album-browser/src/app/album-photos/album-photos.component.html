<h2>Album Photos</h2>

<div *ngIf="loading">Loading photos…</div>
<div *ngIf="error">{{ error }}</div>

<div
  class="photo-grid"
  *ngIf="!loading && photos.length > 0"
>
  <div *ngFor="let photo of photos" class="photo-item">
    <img [src]="photo.thumbnailUrl" [alt]="photo.title" />
    <div class="photo-title">{{ photo.title }}</div>
  </div>
</div>

<div *ngIf="!loading && photos.length === 0 && !error">No photos found.</div>

<button (click)="goBack()" class="secondary">Back</button>
